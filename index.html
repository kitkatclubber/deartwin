<!DOCTYPE html>
<html>
<head>
<title>Simple Site</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  font-family: Arial;
  color: white;
}

.bg {
  position: absolute;
  width: 100%;
  height: 100%;
  top: 0;
  left: 0;
}

.bg img {
  position: absolute;
  width: 300px;
  opacity: 0.25;
}

.img1 { top: 10%; left: 10%; }
.img2 { top: 20%; right: 10%; }
.img3 { bottom: 10%; left: 20%; }

.center {
  z-index: 2;
  text-align: center;
}

</style>
</head>

<body>

<div class="bg">
  <img class="img1" src="images/pic1.jpg">
  <img class="img2" src="images/pic2.jpg">
  <img class="img3" src="images/pic3.jpg">
</div>

<div class="center">
  <h1>Hello</h1>
  <p>Simple text in the middle</p>
</div>

</body>
</html>
