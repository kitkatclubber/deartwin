<!DOCTYPE html>
<html>
<head>
<title>Dear twinqle</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: black;
  overflow: hidden;
  font-family: Arial;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
}

.bg {
  position: absolute;
  width: 100%;
  height: 100%;
  top: 0;
  left: 0;
}

.bg img {
  position: absolute;
  width: 45%;
  height: 45%;
  object-fit: cover;
  opacity: 0.22;
  filter: blur(1px);
}

.img1 { top: 0; left: 0; }
.img2 { top: 0; right: 0; }
.img3 { bottom: 0; left: 25%; }

.center {
  position: relative;
  z-index: 10;
  text-align: center;
}

</style>
</head>

<body>

<div class="bg">
  <img class="img1" src="images/pic1.jpg">
  <img class="img2" src="images/pic2.jpg">
  <img class="img3" src="images/pic3.jpg">
</div>

<div class="center">
  <h1>Dear everyone and anyone and someone..</h1>
  <p>On the 1st of April 2029, I'll be travelling with Elon Musk a million light years away to see what our pretty Earth looked like then. Wish me with one look!</p>
</div>

</body>
</html>
